version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: inbudex-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inbudex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inbudex-network

  # Adminer - Web UI for database management
  adminer:
    image: adminer:latest
    container_name: inbudex-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inbudex-network
  
  api:
    build: ./backend/api
    container_name: inbudex-api
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/inbudex
      - SQLALCHEMY_ECHO=false
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inbudex-network

  # AI Service  
  ai-service:
    build: ./backend/ai-service
    container_name: inbudex-ai
    ports:
      - "8000:8000"
    environment:
      - API_BASE_URL=${API_BASE_URL}  # Internal container URL
      - API_KEY=${API_KEY}  # For auth
    networks:
      - inbudex-network

volumes:
  postgres_data:

networks:
  inbudex-network:
    driver: bridge